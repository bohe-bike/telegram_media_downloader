version: "3.3"

services:
  telegram_media_downloader:
    image: sbkdockerhub/telegram_media_downloader:latest
    build: .
    ports:
      # Here is what you need to edit
      - "5000:5000"
    #environment:
    #  - http_proxy=http://192.168.101.30:10811
    #  - https_proxy=http://192.168.101.30:10811
    # Flask secret key for session signing (random if not set, sessions reset on restart)
    #  - TDL_SECRET_KEY=your_secret_key_here
    # AES encryption key/IV for web login (must match login.html frontend)
    #  - TDL_AES_KEY=1234123412ABCDEF
    #  - TDL_AES_IV=ABCDEF1234123412
    volumes:
      # Here is what you need to edit
      - "./downloads/:/app/downloads/"

      # Rclone
      - "$HOME/.config/rclone/:$HOME/.config/rclone/"

      # The following is what you don't need to edit
      - "./config.yaml:/app/config.yaml"
      - "./data.yaml:/app/data.yaml"
      - "./log/:/app/log/"
      - "./sessions/:/app/sessions"
      - "./temp/:/app/temp"
    #restart: "unless-stopped"
# volumes:
#   sessions:
#   temp:
