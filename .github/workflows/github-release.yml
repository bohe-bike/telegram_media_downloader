name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tdl-binaries:
    name: Build tdl binaries for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win64

    env:
      DISTPATH: tdl-${{ github.ref_name }}-${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -r requirements.txt
          python gen_filter_cache.py
          python -m pip install pyinstaller==6.7.0

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --distpath ./${{ env.DISTPATH }} media_downloader.spec

      - name: Add release docs
        shell: pwsh
        run: |
          Copy-Item README.md ./${{ env.DISTPATH }}/README.md -Force
          Copy-Item README_CN.md ./${{ env.DISTPATH }}/README_CN.md -Force
          Copy-Item LICENSE ./${{ env.DISTPATH }}/LICENSE -Force

      - name: Archive artifact
        shell: pwsh
        run: |
          Compress-Archive -Path ./${{ env.DISTPATH }}/* -DestinationPath ./${{ env.DISTPATH }}.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DISTPATH }}
          path: ${{ env.DISTPATH }}.zip

  create-release:
    name: Create GitHub release
    needs: build-tdl-binaries
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-assets/**/*.zip
          generate_release_notes: true
